# ───────────────────────────────────────────────────────────────────────────
# GAP ANALYSIS — MISSING SKILLS
# ───────────────────────────────────────────────────────────────────────────

missing_skills:

  ecommerce-auth:
    priority: HIGH
    rationale: >
      Phone-first authentication (E.164 format), Laravel Sanctum token lifecycle,
      login/logout/register patterns, and password reset via SMS are used across
      Backend Developer, Admin Frontend Dev, and Storefront Frontend Dev.
      Currently scattered across copilot-instructions.md with no dedicated skill.
    primary_owner: Backend Developer
    consumers: [Admin Frontend Dev, Storefront Frontend Dev]
    suggested_file: .github/skills/ecommerce-auth/SKILL.md

  ecommerce-checkout:
    priority: HIGH
    rationale: >
      Cart state management, multi-step checkout flow (cart → info → payment → confirm),
      payment gateway integration (Stripe / PayPal), and order creation API are
      core e-commerce flows with no documented skill module.
    primary_owner: Storefront Frontend Dev
    consumers: [Backend Developer]
    suggested_file: .github/skills/ecommerce-checkout/SKILL.md

  ecommerce-performance:
    priority: MEDIUM
    rationale: >
      Query optimisation (N+1 detection, eager loading), Redis caching patterns,
      OPcache configuration, Core Web Vitals benchmarking, and Lighthouse CI setup.
      Performance targets are defined (API <200ms p95, LCP <1s) but implementation
      patterns are not captured in a reusable skill.
    primary_owner: Backend Developer   # query optimisation
    consumers: [DevOps Engineer, Storefront Frontend Dev]
    suggested_file: .github/skills/ecommerce-performance/SKILL.md

  ecommerce-media:
    priority: MEDIUM
    rationale: >
      Product image upload (Spatie Media Library or custom), image optimisation
      (WebP conversion, resizing), CDN delivery, and Next.js next/image integration.
      Media handling is not currently documented as a reusable module.
    primary_owner: Backend Developer
    consumers: [Admin Frontend Dev, Storefront Frontend Dev]
    suggested_file: .github/skills/ecommerce-media/SKILL.md
